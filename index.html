<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Frame Scrub</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  background: black;
}

#frame {
  width: 100vw;
  height: 100vh;
  object-fit: cover;
  position: fixed;
  inset: 0;
}
</style>
</head>

<body>

<img id="frame" />

<script>

/* =========================
   CONFIG
   ========================= */
const TOTAL_FRAMES = 144;
const PAD = 5; // frame_00001 style → 5 digits

const BASE = "https://alejferrandiz-boop.github.io/stills/frame_";

/* =========================
   BUILD FRAME LIST
   ========================= */
const frames = [];

for (let i = 1; i <= TOTAL_FRAMES; i++) {
  const num = String(i).padStart(PAD, "0");
  frames.push(`${BASE}${num}.jpeg`);
}

/* =========================
   PRELOAD (important)
   ========================= */
frames.forEach(src => {
  const img = new Image();
  img.src = src;
});

/* =========================
   INIT
   ========================= */
const img = document.getElementById("frame");
img.src = frames[0];

/* =========================
   SMOOTH SCRUB STATE
   ========================= */
let targetIndex = 0;
let currentIndex = 0;

/* =========================
   MOUSE CONTROL
   ========================= */
window.addEventListener("mousemove", (e) => {
  const percent = e.clientX / window.innerWidth;
  targetIndex = Math.floor(percent * (frames.length - 1));
});

/* =========================
   ANIMATION LOOP (smooth interpolation)
   ========================= */
function animate() {
  currentIndex += (targetIndex - currentIndex) * 0.035;

  const frame = frames[Math.round(currentIndex)];
  if (frame && img.src !== frame) {
    img.src = frame;
  }

  requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
