<script>

const BASE = "https://alejferrandiz-boop.github.io/stills/frame_";
const PAD = 6;   // 🔥 THIS is the fix
const GUESS_MAX = 300;

function checkImage(url) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => resolve(url);
    img.onerror = () => resolve(null);
    img.src = url;
  });
}

async function buildFrames() {
  const valid = [];

  const checks = [];

  for (let i = 1; i <= GUESS_MAX; i++) {
    const num = String(i).padStart(PAD, "0"); // 👈 now matches frame_000100
    const url = `${BASE}${num}.png`;

    checks.push(
      checkImage(url).then(res => {
        if (res) valid.push(res);
      })
    );
  }

  await Promise.all(checks);

  valid.sort();
  return valid;
}

(async function init() {

  const frames = await buildFrames();

  const img = document.getElementById("frame");
  img.src = frames[0];

  // preload
  frames.forEach(src => {
    const i = new Image();
    i.src = src;
  });

  let target = 0;
  let current = 0;

  window.addEventListener("mousemove", (e) => {
    const percent = e.clientX / window.innerWidth;
    target = Math.floor(percent * (frames.length - 1));
  });

  function animate() {
    current += (target - current) * 0.15;
    img.src = frames[Math.round(current)];
    requestAnimationFrame(animate);
  }

  animate();

})();

</script>
