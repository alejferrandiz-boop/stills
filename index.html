<script>

const BASE = "https://alejferrandiz-boop.github.io/stills/frame_";

// all possible padding styles your export uses
const PADS = [4, 5, 6];

const GUESS_MAX = 300;

function checkImage(url) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => resolve(url);
    img.onerror = () => resolve(null);
    img.src = url;
  });
}

async function buildFrames() {
  const valid = [];

  for (let i = 1; i <= GUESS_MAX; i++) {

    const attempts = PADS.map(pad => {
      const num = String(i).padStart(pad, "0");
      return `${BASE}${num}.png`;
    });

    const results = await Promise.all(attempts.map(checkImage));

    const found = results.find(Boolean);

    if (found) valid.push(found);
  }

  return valid;
}

(async function init() {

  const frames = await buildFrames();

  if (!frames.length) {
    console.error("No frames found.");
    return;
  }

  const img = document.getElementById("frame");
  img.src = frames[0];

  // preload
  frames.forEach(src => {
    const i = new Image();
    i.src = src;
  });

  let target = 0;
  let current = 0;

  window.addEventListener("mousemove", (e) => {
    const percent = e.clientX / window.innerWidth;
    target = Math.floor(percent * (frames.length - 1));
  });

  function animate() {
    current += (target - current) * 0.15;
    img.src = frames[Math.round(current)];
    requestAnimationFrame(animate);
  }

  animate();

})();

</script>
